<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design App</title>
  <script src="https://res.cdn.office.net/teams-js/2.22.0/js/MicrosoftTeams.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f3f2f1;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 48px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    h1 { color: #1a1a2e; margin-bottom: 8px; font-size: 24px; }
    p { color: #666; margin-bottom: 32px; }
    button {
      background: #0078D4;
      color: white;
      border: none;
      padding: 14px 36px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover { background: #005a9e; }
    #status {
      margin-top: 16px;
      font-size: 13px;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Design App</h1>
    <p>ES Metals SAS</p>
    <button onclick="abrirApp()">Abrir Design App</button>
    <div id="status"></div>
  </div>

  <script>
    // Inicialización normal
    microsoftTeams.app.initialize().then(() => {
      document.getElementById('status').innerText = 'Teams detectado ✅';
    }).catch(() => {
      document.getElementById('status').innerText = 'Ejecutando fuera de Teams';
    });

    // ESTA ES LA FUNCIÓN QUE CAMBIAMOS
    function abrirApp() {
      document.getElementById('status').innerText = 'Abriendo externamente...';
      
      microsoftTeams.app.initialize().then(() => {
        // IMPORTANTE: Cambia esta URL por la ruta real de tu repositorio en GitHub Pages
        const urlPuente = 'https://liamonassis.github.io/designapp-launcher/lanzador.html';
        
        microsoftTeams.app.openLink(urlPuente).then(() => {
          document.getElementById('status').innerText = 'Navegador externo lanzado ✅';
        }).catch((err) => {
          document.getElementById('status').innerText = 'Error: ' + err;
        });
      }).catch(() => {
        // Si el usuario abre este index fuera de Teams, el protocolo directo sí funciona
        window.location.href = 'designapp://abrir';
      });
    }
  </script>
</body>
</html>
