<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f3f2f1;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 48px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    h1 { color: #1a1a2e; margin-bottom: 8px; font-size: 24px; }
    p { color: #666; margin-bottom: 32px; }
    button {
      background: #0078D4;
      color: white;
      border: none;
      padding: 14px 36px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover { background: #005a9e; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Design App</h1>
    <p>ES Metals SAS</p>
    <button onclick="abrirApp()">Abrir Design App</button>
  </div>

  <script>
    function abrirApp() {
      // Intento 1 - window.open
      var w = window.open('designapp://abrir', '_blank');
      
      // Intento 2 - si falla, usa un iframe oculto
      setTimeout(function() {
        if (!w || w.closed) {
          var iframe = document.createElement('iframe');
          iframe.style.display = 'none';
          iframe.src = 'designapp://abrir';
          document.body.appendChild(iframe);
          setTimeout(function() {
            document.body.removeChild(iframe);
          }, 2000);
        }
      }, 500);
    }
  </script>
</body>
</html>
