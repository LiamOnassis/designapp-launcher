<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design App - ES Metals</title>
  <script src="https://res.cdn.office.net/teams-js/2.22.0/js/MicrosoftTeams.min.js"></script>
  <style>
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }
    
    body {
      font-family: 'Segoe UI', sans-serif;
      /* Imagen de fondo conectada directamente a tu repositorio */
      background: url('https://raw.githubusercontent.com/LiamOnassis/designapp-launcher/refs/heads/main/PORTADA%20INDUCCIONES.png') no-repeat center center fixed;
      background-size: cover;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    /* Capa semi-transparente para mejorar el contraste visual */
    .overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255, 255, 255, 0.1); 
      z-index: 1;
    }

    .content-wrapper {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      height: 100%;
      width: 100%;
      padding: 40px 20px;
    }

    /* --- ENCABEZADO --- */
    .header .logo {
      max-height: 80px; /* Ajusta este valor si el logo se ve muy grande o pequeño */
      object-fit: contain;
    }

    /* --- CENTRO --- */
    .center-section {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .btn {
      background: #000000;
      color: white;
      border: none;
      padding: 16px 50px;
      border-radius: 50px;
      font-size: 22px;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      text-transform: uppercase;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
      transition: background 0.3s, transform 0.2s;
    }

    .btn:hover { 
      background: #333333; 
      transform: scale(1.02);
    }

    #status {
      margin-top: 15px;
      font-size: 14px;
      color: #000;
      font-weight: 600;
      background: rgba(255, 255, 255, 0.7);
      padding: 4px 12px;
      border-radius: 20px;
    }

    /* --- PIE DE PÁGINA --- */
    .footer {
      text-align: center;
    }

    .footer img {
      max-height: 50px; /* Ajusta el tamaño de las firmas aquí */
      margin-bottom: 8px;
      object-fit: contain;
    }

    .footer p {
      font-size: 11px;
      letter-spacing: 3px;
      color: #333;
      text-transform: uppercase;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="overlay"></div>
  
  <div class="content-wrapper">
    
    <div class="header">
      <img src="https://raw.githubusercontent.com/LiamOnassis/designapp-launcher/refs/heads/main/LOGO.png" alt="ES Metals Logo" class="logo">
    </div>

    <div class="center-section">
      <a href="https://liamonassis.github.io/designapp-launcher/lanzador.html" target="_blank" rel="noopener noreferrer" class="btn">Iniciar Inducción</a>
      <div id="status">Verificando...</div>
    </div>

    <div class="footer">
      <img src="https://raw.githubusercontent.com/LiamOnassis/designapp-launcher/refs/heads/main/FIRMA%20INDUCCIONES.png" alt="Firmas Diseñadores">
      <p>Diseñado y desarrollado por</p>
    </div>

  </div>

  <script>
    // Inicialización de Teams
    microsoftTeams.app.initialize().then(() => {
      document.getElementById('status').innerText = 'Teams detectado ✅';
    }).catch(() => {
      document.getElementById('status').innerText = 'Ejecutando fuera de Teams';
    });
  </script>
</body>
</html>
